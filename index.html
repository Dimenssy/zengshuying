<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>21岁生日快乐 · 来自康的祝福</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      touch-action: none;
      background: #a0d0f0;
      font-family: system-ui, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      position: fixed;
      top: 0;
      left: 0;
    }
    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .bless-toast {
      position: absolute;
      pointer-events: none;
      font-weight: 600;
      font-size: clamp(18px, 6vw, 28px);
      color: #ffffff;
      text-shadow: 0 0 15px rgba(70, 130, 200, 0.9), 0 4px 8px rgba(0,0,0,0.3);
      white-space: nowrap;
      opacity: 0;
      transform: translate(-50%, -50%);
      animation: floatUp 2.8s ease-out forwards;
      z-index: 20;
      letter-spacing: 2px;
    }
    @keyframes floatUp {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
      15% { opacity: 1; transform: translate(-50%, -70%) scale(1.1); }
      25% { transform: translate(-50%, -80%) scale(1); }
      85% { opacity: 0.8; }
      100% { opacity: 0; transform: translate(-50%, -260%) scale(0.9); }
    }
    .hint-text {
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: rgba(255, 255, 255, 0.9);
      font-size: clamp(13px, 4vw, 15px);
      font-weight: 500;
      letter-spacing: 2px;
      text-shadow: 0 2px 10px rgba(0,100,200,0.6);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      padding: 10px 28px;
      pointer-events: none;
      z-index: 15;
      backdrop-filter: blur(3px);
      border-radius: 30px;
      white-space: nowrap;
      width: fit-content;
    }
    .click-counter {
      position: absolute;
      top: 25px;
      right: 25px;
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 8px 20px;
      color: white;
      font-weight: bold;
      font-size: 18px;
      box-shadow: 0 6px 20px rgba(0, 100, 200, 0.3);
      border: 1px solid rgba(255,255,255,0.5);
      letter-spacing: 2px;
      z-index: 20;
      pointer-events: none;
    }
    @media (max-width: 400px) {
      .bless-toast { font-size: 20px; }
      .hint-text { font-size: 13px; padding: 8px 20px; }
    }
  </style>
</head>
<body>
  <canvas id="birthdayCanvas"></canvas>
  <div id="ui-layer"></div>
  <div class="click-counter" id="clickDisplay">✨ 0</div>
  <div class="hint-text" id="nameHint">💙 轻点屏幕 · 送给最好的曾淑颖 💙</div>

  <script>
    (function() {
      // ================= 闺蜜名字 =================
      const BESTIE_NAME = "曾淑颖";
      
      // ================= 全局变量 =================
      const canvas = document.getElementById('birthdayCanvas');
      const ctx = canvas.getContext('2d');
      const uiLayer = document.getElementById('ui-layer');
      const clickDisplay = document.getElementById('clickDisplay');
      const nameHint = document.getElementById('nameHint');

      let W, H;
      
      let stars = [];
      let confettiParticles = [];
      let fireworkParticles = [];
      let blessingToasts = [];

      let clickCount = 0;
      let animationFrameId = null;
      let isPageVisible = true;
      
      let starDensityMultiplier = 0.4;
      
      // 祝福语列表（已优化）
      const blessings = [
        "✨ 永远发光", "🌸 开心快乐", "💖 友谊万岁", "🎂 生日快乐", "🌙 甜梦相伴",
        "🍰 甜蜜每天", "🫧 泡泡心情", "⭐ 你最珍贵", "💎 闪闪惹人爱", "🎈 幸福膨胀",
        "🦋 自由如风", "🌷 笑靥如花", "🍬 糖分超标", "💫 好运爆棚", "🧁 软糯可爱",
        "🎵 快乐成歌", "☁️ 云端漫步", "💜 偏爱给你", "🍭 淑颖最棒", "🌟 星光满载",
        "🕊️ 平安喜乐", "🎁 心想事成", "💗 心有灵犀", "🌸 花开富贵", "🍀 幸运常伴",
        "🧸 抱抱世界", "🎀 少女心永恒", "💐 美丽绽放", "✨ 今夜好梦", "💙 淑颖是光"
      ];
      
      function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }
      
      let shuffledBlessings = shuffleArray([...blessings]);
      let blessingIndex = 0;
      
      function getNextBlessing() {
        if (blessingIndex >= shuffledBlessings.length) {
          shuffledBlessings = shuffleArray([...blessings]);
          blessingIndex = 0;
        }
        return shuffledBlessings[blessingIndex++];
      }

      // ================= 离屏Canvas汉字采样 =================
      let chineseCharPoints = null;
      let currentDisplayChar = '';
      
      function getRandomCharFromName() {
        if (!BESTIE_NAME || BESTIE_NAME.length === 0) return '爱';
        const chars = BESTIE_NAME.replace(/\s+/g, '').split('');
        if (chars.length === 0) return '梦';
        return chars[Math.floor(Math.random() * chars.length)];
      }

      function sampleTextPoints(char, pointCount = 480) {
        const offCanvas = document.createElement('canvas');
        const offCtx = offCanvas.getContext('2d');
        const fontSize = 180;
        offCanvas.width = 220;
        offCanvas.height = 220;
        
        offCtx.clearRect(0, 0, offCanvas.width, offCanvas.height);
        offCtx.fillStyle = '#000000';
        offCtx.font = `bold ${fontSize}px "PingFang SC", "Microsoft YaHei", "Heiti SC", sans-serif`;
        offCtx.textAlign = 'center';
        offCtx.textBaseline = 'middle';
        offCtx.fillText(char, offCanvas.width/2, offCanvas.height/2);
        
        const imageData = offCtx.getImageData(0, 0, offCanvas.width, offCanvas.height);
        const pixels = imageData.data;
        const candidatePoints = [];
        
        for (let y = 0; y < offCanvas.height; y += 1.8) {
          for (let x = 0; x < offCanvas.width; x += 1.8) {
            const index = (y * offCanvas.width + x) * 4;
            if (pixels[index + 3] > 128) {
              candidatePoints.push({ x: x - offCanvas.width/2, y: y - offCanvas.height/2 });
            }
          }
        }
        
        if (candidatePoints.length === 0) {
          return Array.from({ length: pointCount }, () => ({
            x: (Math.random() - 0.5) * 160, y: (Math.random() - 0.5) * 160
          }));
        }
        
        const targetCount = Math.min(pointCount, candidatePoints.length);
        const sampled = [];
        const usedIndices = new Set();
        while (sampled.length < targetCount && sampled.length < candidatePoints.length) {
          const idx = Math.floor(Math.random() * candidatePoints.length);
          if (!usedIndices.has(idx)) {
            usedIndices.add(idx);
            sampled.push(candidatePoints[idx]);
          }
        }
        return sampled;
      }

      // ================= 粒子类 =================
      class Star {
        constructor() { this.reset(true); }
        reset(randomY = false) {
          this.x = Math.random() * W;
          this.y = randomY ? Math.random() * H : -10 - Math.random() * 40;
          this.size = Math.random() * 2.8 + 1.2;
          this.speedY = Math.random() * 0.7 + 0.25;
          this.swingAmp = Math.random() * 0.4 + 0.2;
          this.swingSpeed = Math.random() * 0.015 + 0.008;
          this.alpha = Math.random() * 0.7 + 0.3;
          this.phase = Math.random() * Math.PI * 2;
          const colorRand = Math.random();
          if (colorRand < 0.7) this.color = 'rgba(255, 255, 255, ';
          else if (colorRand < 0.9) this.color = 'rgba(210, 230, 255, ';
          else this.color = 'rgba(180, 200, 255, ';
        }
        update() {
          this.y += this.speedY;
          this.x += Math.sin(this.phase) * this.swingAmp;
          this.phase += this.swingSpeed;
          if (this.y > H + 15 || this.x < -20 || this.x > W + 20) this.reset();
        }
        draw(ctx) {
          ctx.fillStyle = this.color + this.alpha + ')';
          ctx.beginPath();
          const x = this.x, y = this.y, s = this.size;
          ctx.arc(x, y, s * 0.9, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = this.color + (this.alpha * 0.6) + ')';
          ctx.beginPath();
          ctx.arc(x - s*0.3, y - s*0.3, s*0.5, 0, Math.PI*2);
          ctx.fill();
        }
      }

      class Confetti {
        constructor(x, y) {
          this.x = x; this.y = y;
          const angle = Math.random() * Math.PI * 2;
          const speed = Math.random() * 8 + 3;
          this.vx = Math.cos(angle) * speed;
          this.vy = Math.sin(angle) * speed - Math.random() * 2;
          this.gravity = 0.25; this.resistance = 0.99;
          this.rotation = Math.random() * Math.PI * 2;
          this.rotationSpeed = (Math.random() - 0.5) * 0.25;
          this.width = Math.random() * 7 + 3;
          this.height = Math.random() * 4 + 2;
          const colorType = Math.random();
          if (colorType < 0.4) this.color = `rgba(255, 80, 120, `;
          else if (colorType < 0.75) this.color = `rgba(80, 150, 255, `;
          else this.color = `rgba(170, 80, 220, `;
          this.alpha = 0.95;
          this.fadeSpeed = 0.018 + Math.random() * 0.025;
          this.life = 1.0;
        }
        update() {
          this.vy += this.gravity;
          this.vx *= this.resistance; this.vy *= this.resistance;
          this.x += this.vx; this.y += this.vy;
          this.rotation += this.rotationSpeed;
          this.life -= this.fadeSpeed;
          this.alpha = Math.max(0, this.life);
        }
        draw(ctx) {
          if (this.alpha <= 0.02) return;
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(this.rotation);
          ctx.fillStyle = this.color + this.alpha + ')';
          ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);
          ctx.restore();
        }
        isDead() { return this.life <= 0.02 || this.y > H + 30; }
      }

      class FireworkParticle {
        constructor(x, y) {
          this.x = x; this.y = y;
          const angle = Math.random() * Math.PI * 2;
          const speed = Math.random() * 6 + 2.5;
          this.vx = Math.cos(angle) * speed;
          this.vy = Math.sin(angle) * speed - 1.5;
          this.targetX = null; this.targetY = null;
          this.state = 'diffuse';
          this.size = Math.random() * 3.2 + 1.5;
          let r, g, b;
          const rand = Math.random();
          if (rand < 0.6) { r = 70+Math.floor(Math.random()*60); g = 130+Math.floor(Math.random()*80); b = 240+Math.floor(Math.random()*15); }
          else if (rand < 0.85) { r = 150+Math.floor(Math.random()*70); g = 70+Math.floor(Math.random()*60); b = 210+Math.floor(Math.random()*45); }
          else { r = 220+Math.floor(Math.random()*35); g = 180+Math.floor(Math.random()*60); b = 220+Math.floor(Math.random()*35); }
          this.color = `rgba(${r}, ${g}, ${b}, `;
          this.alpha = 0.9; this.life = 1.0;
          this.fadeSpeed = 0.008;
          this.adsorbSpeed = 0.085;
        }
        setTarget(tx, ty) { this.targetX = tx; this.targetY = ty; this.state = 'adsorb'; }
        update() {
          if (this.state === 'diffuse') {
            this.x += this.vx; this.y += this.vy;
            this.vy += 0.06; this.vx *= 0.995;
          } else if (this.state === 'adsorb' && this.targetX !== null) {
            const dx = this.targetX - this.x;
            const dy = this.targetY - this.y;
            const dist = Math.sqrt(dx*dx+dy*dy);
            if (dist > 0.8) {
              this.vx += (dx/dist)*this.adsorbSpeed*1.4;
              this.vy += (dy/dist)*this.adsorbSpeed*1.4;
              this.vx *= 0.92; this.vy *= 0.92;
              this.x += this.vx; this.y += this.vy;
            } else {
              this.x += (Math.random()-0.5)*0.6;
              this.y += (Math.random()-0.5)*0.6;
            }
          }
          this.life -= this.fadeSpeed;
          this.alpha = Math.max(0, this.life);
        }
        draw(ctx) {
          if (this.alpha <= 0.02) return;
          ctx.fillStyle = this.color + this.alpha + ')';
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
          ctx.fill();
        }
        isDead() { return this.life <= 0.02; }
      }

      // ================= 辅助函数 =================
      function resizeCanvas() {
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W;
        canvas.height = H;
      }

      function generateInitialStars() {
        const count = Math.floor((W * H) / 3800 * starDensityMultiplier);
        for (let i = 0; i < count; i++) stars.push(new Star());
      }

      function replenishStars() {
        const targetCount = Math.floor((W * H) / 3400 * starDensityMultiplier);
        while (stars.length < targetCount) stars.push(new Star());
        while (stars.length > targetCount + 8) stars.pop();
      }

      function showBlessingToast(x, y, text) {
        const toast = document.createElement('div');
        toast.className = 'bless-toast';
        toast.textContent = text;
        let posX = Math.min(Math.max(x, 60), W - 60);
        let posY = Math.min(Math.max(y, 50), H - 70);
        toast.style.left = posX + 'px';
        toast.style.top = posY + 'px';
        uiLayer.appendChild(toast);
        blessingToasts.push(toast);
        toast.addEventListener('animationend', () => {
          if (toast.parentNode === uiLayer) {
            uiLayer.removeChild(toast);
            blessingToasts = blessingToasts.filter(t => t !== toast);
          }
        });
        setTimeout(() => {
          if (toast.parentNode === uiLayer) {
            uiLayer.removeChild(toast);
            blessingToasts = blessingToasts.filter(t => t !== toast);
          }
        }, 3200);
      }

      // ================= 点击核心逻辑 =================
      function handleCanvasClick(e) {
        e.preventDefault();
        let clientX, clientY;
        if (e.touches) {
          clientX = e.touches[0].clientX;
          clientY = e.touches[0].clientY;
        } else {
          clientX = e.clientX;
          clientY = e.clientY;
        }
        const clickX = Math.min(W-10, Math.max(10, clientX));
        const clickY = Math.min(H-10, Math.max(10, clientY));
        
        clickCount++;
        clickDisplay.textContent = `✨ ${clickCount}`;
        
        // 首次点击提升星星密度
        if (clickCount === 1) {
          starDensityMultiplier = 1.2;
          nameHint.style.opacity = '0.6';
          nameHint.textContent = '💫 继续点击 · 惊喜不断 💫';
        }
        
        // 彩带爆炸
        const confettiCount = 22 + Math.floor(Math.random() * 18);
        for (let i = 0; i < confettiCount; i++) {
          confettiParticles.push(new Confetti(clickX, clickY));
        }
        
        // 随机祝福语
        showBlessingToast(clickX, clickY - 15, getNextBlessing());
        
        // 第5次点击：汉字烟花
        if (clickCount === 5) {
          const selectedChar = getRandomCharFromName();
          currentDisplayChar = selectedChar;
          chineseCharPoints = sampleTextPoints(selectedChar, 480);
          const launchX = W / 2 + (Math.random() * 60 - 30);
          const launchY = H * 0.7;
          for (let i = 0; i < 420; i++) {
            fireworkParticles.push(new FireworkParticle(launchX, launchY));
          }
          setTimeout(() => {
            if (chineseCharPoints && chineseCharPoints.length > 0) {
              const centerX = W / 2;
              const centerY = H * 0.38;
              fireworkParticles.forEach((p, idx) => {
                if (p && !p.isDead()) {
                  const point = chineseCharPoints[idx % chineseCharPoints.length];
                  p.setTarget(centerX + point.x * 0.9, centerY + point.y * 0.9);
                }
              });
            }
            nameHint.textContent = `💎 看！是“${selectedChar}” 💎`;
            nameHint.style.opacity = '0.9';
          }, 380);
          setTimeout(() => {
            if (clickCount === 5) {
              nameHint.textContent = '💙 轻点屏幕 · 送给最好的曾淑颖 💙';
              nameHint.style.opacity = '0.7';
            }
          }, 6200);
        }
        
        // ✨ 第10次点击：全屏金色流星雨彩蛋 ✨
        if (clickCount === 10) {
          for (let i = 0; i < 65; i++) {
            let goldenStar = new Star();
            goldenStar.speedY = Math.random() * 2.8 + 1.8;
            goldenStar.size = Math.random() * 4 + 2.2;
            goldenStar.color = 'rgba(255, 215, 0, ';
            goldenStar.alpha = 0.95;
            goldenStar.swingAmp = Math.random() * 0.8 + 0.3;
            stars.push(goldenStar);
          }
          nameHint.textContent = '🌟 十全十美！曾淑颖永远幸福 🌟';
          nameHint.style.opacity = '0.95';
          // 额外彩带祝福
          for (let i=0; i<15; i++) {
            confettiParticles.push(new Confetti(W/2 + (Math.random()-0.5)*180, H*0.6));
          }
          showBlessingToast(W/2, H*0.45, '💛 十全十美 💛');
        }
        
        // 每次点击额外补充几颗星星
        for (let i=0; i<2; i++) stars.push(new Star());
      }

      // ================= 动画循环 =================
      function animationLoop() {
        if (!isPageVisible) {
          animationFrameId = requestAnimationFrame(animationLoop);
          return;
        }
        ctx.clearRect(0, 0, W, H);
        const gradient = ctx.createLinearGradient(0, 0, 0, H);
        gradient.addColorStop(0, '#c3e0f7');
        gradient.addColorStop(0.6, '#b0d4f0');
        gradient.addColorStop(1, '#d0e6ff');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, W, H);
        
        ctx.save();
        ctx.globalAlpha = 0.2;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath(); ctx.arc(70, 120, 27, 0, Math.PI*2); ctx.arc(115, 108, 32, 0, Math.PI*2); ctx.arc(40, 110, 29, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(W-100, 200, 33, 0, Math.PI*2); ctx.arc(W-55, 185, 38, 0, Math.PI*2); ctx.arc(W-125, 188, 35, 0, Math.PI*2); ctx.fill();
        ctx.restore();
        
        replenishStars();
        for (let star of stars) { star.update(); star.draw(ctx); }
        for (let i = confettiParticles.length-1; i >= 0; i--) {
          confettiParticles[i].update(); confettiParticles[i].draw(ctx);
          if (confettiParticles[i].isDead()) confettiParticles.splice(i,1);
        }
        for (let i = fireworkParticles.length-1; i >= 0; i--) {
          fireworkParticles[i].update(); fireworkParticles[i].draw(ctx);
          if (fireworkParticles[i].isDead()) fireworkParticles.splice(i,1);
        }
        animationFrameId = requestAnimationFrame(animationLoop);
      }

      function handleVisibilityChange() { isPageVisible = !document.hidden; }

      function bindEvents() {
        canvas.addEventListener('click', handleCanvasClick);
        canvas.addEventListener('touchstart', (e) => {
          e.preventDefault();
          handleCanvasClick(e);
        }, { passive: false });
        window.addEventListener('resize', resizeCanvas);
        document.addEventListener('visibilitychange', handleVisibilityChange);
      }

      function start() {
        resizeCanvas();
        generateInitialStars();
        bindEvents();
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        animationLoop();
        clickDisplay.textContent = `✨ 0`;
      }

      start();
    })();
  </script>
</body>
</html>
